# ============================================================
# ROOT-LEVEL COPIES — requires sudo
# ============================================================
# These entries are COPIED (not symlinked) into system
# directories (e.g. /usr/share) that are owned by root.
# Copies are used because system services like sddm cannot
# traverse the user's home directory (mode 700).
#
# Usage:
#   sudo ./scripts/copies-root.sh --create
#   sudo ./scripts/copies-root.sh --delete
# ============================================================

# SDDM Material You theme
$(pwd)/sddm/material-you:/usr/share/sddm/themes/material-you
