###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bindd = $mainMod, RETURN, Terminal, exec, $terminal
bindd = $mainMod, Q, Close window, killactive,
bindd = $mainMod, M, Exit session, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = $mainMod SHIFT, p, Lock screen, exec, hyprlock
bindd = $mainMod, E, File manager, exec, $fileManager
bindd = $mainMod SHIFT, V, Toggle floating, togglefloating,
bindd = $mainMod, SPACE, App launcher, exec, $menu
bindd = $mainMod, P, Pseudo tiling, pseudo,
bindd = $mainMod, T, Toggle split, togglesplit,
bindd = $mainMod SHIFT, F, Fullscreen, fullscreen

# Move focus with mainMod + hjkl
bindd = $mainMod, h, Move focus left, movefocus, l
bindd = $mainMod, l, Move focus right, movefocus, r
bindd = $mainMod, k, Move focus up, movefocus, u
bindd = $mainMod, j, Move focus down, movefocus, d

# Move windows with mainMod + SHIFT + hjkl
bindd = $mainMod SHIFT, h, Move window left, movewindow, l
bindd = $mainMod SHIFT, l, Move window right, movewindow, r
bindd = $mainMod SHIFT, k, Move window up, movewindow, u
bindd = $mainMod SHIFT, j, Move window down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Screenshot
bindd = , PRINT, Screenshot region, exec, hyprshot -m region
bindd = SHIFT, PRINT, Screenshot window, exec, hyprshot -m window
bindd = $mainMod, PRINT, Screenshot monitor, exec, hyprshot -m output

# Scratchpad
bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, Scroll workspace next, workspace, e+1
bindd = $mainMod, mouse_up, Scroll workspace previous, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = $mainMod, mouse:272, Move window (drag), movewindow
bindmd = $mainMod, mouse:273, Resize window (drag), resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindeld = ,XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindeld = ,XF86AudioMute, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindeld = ,XF86AudioMicMute, Toggle mic mute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, brightnessctl -e4 -n2 set 5%+
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, brightnessctl -e4 -n2 set 5%-

# Media controls (requires playerctl)
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Play/pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# Wallpaper picker
bindd = $mainMod SHIFT, W, Wallpaper picker, exec, pick-wallpaper

# Lock screen wallpaper picker
bindd = $mainMod CTRL, W, Lock wallpaper picker, exec, pick-lock-wallpaper

# QuickPanel
bindd = $mainMod SHIFT, Q, Quick panel, exec, quick-panel

# Waybar restart
bindd = $mainMod, B, Restart waybar, exec, launch-waybar

# Show keybindings
bindd = $mainMod, slash, Show keybindings, exec, show-keybindings
