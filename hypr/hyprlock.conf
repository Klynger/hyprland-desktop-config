# Material You lock screen
# Colors are generated by matugen; wallpaper is set by pick-lock-wallpaper

source = ~/.config/hypr/hyprlock-colors.conf
source = ~/.cache/hyprlock-wallpaper.conf

$font_display = Noto Sans Light
$font_body = Noto Sans
$font_body_medium = Noto Sans Medium

general {
    hide_cursor = true
    grace = 3
}

animations {
    enabled = true
    bezier = material, 0.2, 0, 0, 1
    animation = fadeIn, 1, 4, material
    animation = fadeOut, 1, 4, material
    animation = inputFieldDots, 1, 2, material
}

# BACKGROUND
background {
    monitor =
    path = $lock_wallpaper
    blur_passes = 1
    blur_size = 4
    contrast = 0.95
    brightness = 0.7
    vibrancy = 0.3
    vibrancy_darkness = 0.05
}

# SCRIM — dark overlay for contrast
# (using a shape widget as a scrim layer)
shape {
    monitor =
    size = 100%, 100%
    color = rgba(00000055)
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME12
    color = $lock_primary
    font_size = 120
    font_family = $font_display
    shadow_passes = 2
    shadow_size = 4
    shadow_boost = 0.5

    position = 0, 200
    halign = center
    valign = center
}

# DAY OF WEEK
label {
    monitor =
    text = cmd[update:60000] date +"%A"
    color = $lock_on_surface
    font_size = 28
    font_family = $font_body_medium
    shadow_passes = 1

    position = 0, 110
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%B %d, %Y"
    color = $lock_on_surface_variant
    font_size = 18
    font_family = $font_body
    shadow_passes = 1

    position = 0, 72
    halign = center
    valign = center
}

# GREETING
label {
    monitor =
    text = hi, $USER
    color = $lock_primary
    font_size = 22
    font_family = $font_body_medium
    shadow_passes = 1

    position = 0, -20
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    outer_color = $lock_outline_variant
    inner_color = $lock_surface_container
    font_color = $lock_on_surface
    check_color = $lock_primary
    fail_color = $lock_error
    capslock_color = $lock_tertiary

    fade_on_empty = true
    rounding = 28
    font_family = $font_body
    placeholder_text = <i>Type to unlock...</i>
    fail_text = <i>$PAMFAIL</i>

    shadow_passes = 2
    shadow_size = 4
    shadow_boost = 0.3

    position = 0, -90
    halign = center
    valign = center
}
