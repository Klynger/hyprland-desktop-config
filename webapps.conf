# Web app definitions — used by scripts/install-webapps.sh
#
# Format (pipe-delimited):
#   name | url | icon_url | custom_exec (optional) | mime_types (optional)
#
# - icon_url: HTTP/HTTPS URL (downloaded) or local filename (resolved to ~/.local/share/applications/icons/<filename>)
# - custom_exec: leave empty to use the default "launch-webapp <url>"
# - mime_types: leave empty to use the default "text/html;x-scheme-handler/http;x-scheme-handler/https;"
# - $HOME in custom_exec is expanded at install time

